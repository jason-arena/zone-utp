<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZonaUTP - Marketplace Universitario UTP</title>
    <meta name="description" content="ZonaUTP - Marketplace digital exclusivo para la comunidad UTP. Compra, vende e intercambia de forma segura.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../images/PNGs/utplace_logomark_64.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/login.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <!-- Decorative background elements -->
        <div class="background-decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
        
        <!-- Main login card -->
        <div class="login-card">
            <!-- Header section -->
            <div class="login-header">
                <div class="logo-container">
                    <img src="../images/PNGs/Logo.png" alt="ZonaUTP Logo" class="logo-image">
                </div>
                <p class="welcome-text">Marketplace exclusivo UTP</p>
                <p class="subtitle">Acceso seguro solo con correo institucional</p>
            </div>
            
            <!-- Login form -->
            <form class="login-form" id="loginForm" novalidate>
                <!-- Email field -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i>
                        Correo institucional
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="tu.nombre@utp.ac.pa"
                            autocomplete="email"
                            required
                            aria-describedby="email-error"
                        >
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                    <div class="error-message" id="email-error" role="alert"></div>
                </div>
                
                <!-- Password field -->
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Contraseña
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Ingresa tu contraseña"
                            autocomplete="current-password"
                            required
                            aria-describedby="password-error"
                        >
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar/ocultar contraseña">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" id="password-error" role="alert"></div>
                </div>
                
                <!-- Remember me and forgot password -->
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Recordarme</span>
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
                
                <!-- Submit button -->
                <button type="submit" class="login-button" id="loginButton">
                    <span class="button-text">Iniciar sesión</span>
                    <i class="fas fa-arrow-right button-icon"></i>
                    <div class="loading-spinner" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>
                
                <!-- General error message -->
                <div class="general-error" id="generalError" role="alert" style="display: none;"></div>
            </form>
        
            <!-- Footer -->
            <div class="login-footer">
                <p class="help-text">
                    ¿Necesitas ayuda? 
                    <a href="#" class="help-link">Contacta soporte técnico</a>
                </p>
            </div>
        </div>
    
    <!-- JavaScript -->
    <script src="../js/login.js"></script>
</body>
</html>
