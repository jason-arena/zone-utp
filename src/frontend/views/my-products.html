<!-- My Products View - Vista de productos del usuario -->
<div class="view-content">
    <!-- Enhanced Page Header -->
    <section class="page-header gradient-header">
        <div class="container">
            <div class="page-header-content">
                <div class="page-title-section">
                    <div class="title-icon">
                        <i class="fas fa-box"></i>
                    </div>
                    <div class="title-content">
                        <h1 class="page-title">Mis Productos</h1>
                        <p class="page-subtitle">Gestiona los productos que tienes publicados</p>
                        <div class="products-stats">
                            <span class="stat-item">
                                <i class="fas fa-chart-line"></i>
                                <span>12 productos activos</span>
                            </span>
                        </div>
                    </div>
                </div>
                
                <!-- Toolbar -->
                <div class="page-toolbar">
                    <div class="toolbar-right">
                        <button class="btn btn-primary" data-route="sell">
                            <i class="fas fa-plus"></i>
                            Agregar producto
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- My Products Section -->
    <section class="my-products-section">
        <div class="container">
            <!-- Products Filter Tabs -->
            <div class="my-products-filters">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-status="all">
                        Todos <span class="tab-count">12</span>
                    </button>
                    <button class="filter-tab" data-status="active">
                        Activos <span class="tab-count">8</span>
                    </button>
                    <button class="filter-tab" data-status="sold">
                        Vendidos <span class="tab-count">3</span>
                    </button>
                    <button class="filter-tab" data-status="draft">
                        Borradores <span class="tab-count">1</span>
                    </button>
                </div>
            </div>

            <!-- My Products Content -->
            <div class="my-products-content">
                <!-- Products Grid -->
                <div class="my-products-grid" id="myProductsGrid">
                    <!-- Productos del usuario se cargarán dinámicamente aquí -->
                </div>

                <!-- Enhanced Empty State -->
                <div class="empty-my-products" id="emptyMyProducts">
                    <div class="empty-illustration">
                        <div class="empty-icon">
                            <i class="fas fa-box-open"></i>
                        </div>
                    </div>
                    <div class="empty-content">
                        <h3 class="empty-title">¡No tienes productos publicados!</h3>
                        <p class="empty-description">
                            Comienza tu negocio en ZonaUTP publicando tu primer producto.
                            Es fácil, rápido y completamente gratis.
                        </p>
                        <div class="empty-tips">
                            <div class="tip-item">
                                <i class="fas fa-camera"></i>
                                <span>Toma fotos de calidad</span>
                            </div>
                            <div class="tip-item">
                                <i class="fas fa-edit"></i>
                                <span>Escribe una descripción clara</span>
                            </div>
                            <div class="tip-item">
                                <i class="fas fa-tags"></i>
                                <span>Establece un precio justo</span>
                            </div>
                        </div>
                        <div class="empty-actions">
                            <button class="btn btn-primary btn-lg" data-route="sell">
                                <i class="fas fa-plus"></i>
                                Publicar primer producto
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
